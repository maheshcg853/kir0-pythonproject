version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.10
    commands:
      - echo "Installing dependencies..."
      - pip install --upgrade pip
      - pip install -r requirements.txt
  
  pre_build:
    commands:
      - echo "Running unit tests..."
      - python -m unittest test_hello.py
  
  build:
    commands:
      - echo "Build phase - tests passed successfully"
      - echo "Application is ready for deployment"

artifacts:
  files:
    - '**/*'
  name: flask-app-$(date +%Y%m%d-%H%M%S)
